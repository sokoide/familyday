<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ドラゴン城の秘宝 — AI Magic Gamebook</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <!-- 導入 -->
      <section data-phase="intro" class="screen">
        <div class="lang-switch" role="group" aria-label="language">
          <button type="button" data-lang="ja">日本語</button>
          <button type="button" data-lang="en">English</button>
        </div>
        <h1 id="intro-title" class="title"></h1>
        <p id="intro-subtitle" class="subtitle"></p>
        <div class="story-card">
          <p id="intro-line1"></p>
          <p id="intro-line2"><span class="accent" id="intro-accent"></span></p>
          <p id="intro-hint" class="hint"></p>
        </div>
        <div class="mode-select">
          <button id="btn-practice" class="big-btn btn-secondary"></button>
          <button id="btn-start" class="big-btn"></button>
        </div>
      </section>

      <!-- れんしゅう -->
      <section data-phase="practice" class="screen" hidden>
        <div class="story-card">
          <h2 id="practice-title" class="stage-title"></h2>
          <div class="stage-content">
            <img id="practice-image" class="stage-image" alt="" />
            <div class="stage-text">
              <p id="practice-situation"></p>
              <p id="practice-goal" class="goal"></p>
            </div>
          </div>
          <div id="practice-message" class="judge-msg" hidden></div>
          <div id="practice-result" class="ending-result" hidden></div>
        </div>

        <div class="input-area">
          <div class="stage-actions">
            <button id="btn-practice-back" class="small-btn btn-reset-stage"></button>
            <button id="btn-practice-mic" class="mic-btn" aria-label="voice input">
              <span class="mic-icon">🎤</span>
              <span id="practice-mic-label" class="mic-label"></span>
            </button>
          </div>
          <p id="practice-interim" class="interim" aria-live="polite"></p>
          <details class="manual">
            <summary id="practice-manual-summary"></summary>
            <textarea id="practice-input" rows="2"></textarea>
            <button id="btn-practice-manual" class="small-btn"></button>
          </details>
        </div>
      </section>

      <!-- ステージ共通 -->
      <section data-phase="stage" class="screen" hidden>
        <header class="hud">
          <div class="lives" id="lives">❤️❤️❤️</div>
          <div class="timer" id="timer">5:00</div>
        </header>
        <div class="story-card">
          <h2 id="stage-title" class="stage-title"></h2>
          <div class="stage-content">
            <img id="stage-image" class="stage-image" alt="" />
            <div class="stage-text">
              <p id="stage-situation"></p>
              <p id="stage-goal" class="goal"></p>
            </div>
          </div>
        </div>

        <div id="judge-message" class="judge-msg" hidden></div>

        <!-- 判定理由トースト(5秒でフェードアウト) -->
        <div id="judge-reason" class="judge-reason" hidden></div>

        <div class="input-area">
          <div class="stage-actions">
            <button id="btn-stage-restart" class="small-btn btn-reset-stage"></button>
            <button id="btn-mic" class="mic-btn" aria-label="voice input">
              <span class="mic-icon">🎤</span>
              <span id="stage-mic-label" class="mic-label"></span>
            </button>
          </div>
          <p id="interim" class="interim" aria-live="polite"></p>
          <details class="manual">
            <summary id="manual-summary"></summary>
            <textarea id="manual-input" rows="2"></textarea>
            <button id="btn-manual" class="small-btn"></button>
          </details>
        </div>

        <!-- 判定履歴(下に蓄積・スクロール可能) -->
        <div class="history-area">
          <h3 id="history-title" class="history-title"></h3>
          <ul id="history" class="history-list"></ul>
        </div>
      </section>

      <!-- エンディング -->
      <section data-phase="ending" class="screen" hidden>
        <div class="story-card">
          <h2 id="ending-title" class="ending-title"></h2>
          <img id="ending-image" class="ending-image" alt="" />
          <p id="ending-result" class="ending-result"></p>
          <p id="ending-story-text" class="ending-story-text"></p>
        </div>

        <div class="share-area">
          <div class="email-box">
            <label for="email-input" id="email-label"></label>
            <input id="email-input" type="email" autocomplete="off" />
            <button id="btn-email" class="small-btn" disabled></button>
          </div>
        </div>

        <div class="history-area">
          <h3 id="ending-history-title" class="history-title"></h3>
          <ul id="ending-history" class="history-list"></ul>
        </div>

        <button id="btn-restart" class="big-btn"></button>
      </section>
    </div>

    <script type="module" src="/src/app/main.ts"></script>
  </body>
</html>
